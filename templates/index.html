<!DOCTYPE html>
<html>
<head>
<title>Smart Home Dashboard</title>

<style>
body{
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}
button{
    margin:5px;
    padding:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
.alert{color:red;font-weight:bold}
.safe{color:lightgreen}
.card{
    background:#222;
    padding:15px;
    margin:10px;
    border-radius:10px;
}
</style>

</head>

<body>

<h1>🏠 Smart Home Automation</h1>

<!-- GAS -->
<div class="card">
<h2>Gas Monitoring</h2>
<input id="gas" type="number" placeholder="Enter gas value">
<br><br>
<button onclick="sendGas()">Check</button>
<h3 id="status"></h3>
</div>

<!-- APPLIANCES -->
<div class="card">
<h2>Appliances</h2>

<button onclick="control('fan','ON')">Fan ON</button>
<button onclick="control('fan','OFF')">Fan OFF</button>

<button onclick="control('tv','ON')">TV ON</button>
<button onclick="control('tv','OFF')">TV OFF</button>

<button onclick="control('ac','ON')">AC ON</button>
<button onclick="control('ac','OFF')">AC OFF</button>

<button onclick="control('main_power','OFF')">⚡ Cut Power</button>

<h3 id="appliances"></h3>
</div>

<!-- FIRE -->
<div class="card">
<h2>🔥 Fire Detection</h2>
<button onclick="detectFire()">Simulate Fire</button>
</div>

<!-- CAMERA -->
<div class="card">
<h2>📷 Live Camera</h2>
<video id="cam" width="320" autoplay></video>
</div>

<script>

let API = "";


// 🔥 GAS FUNCTION (FIXED)
function sendGas(){
    let v = document.getElementById("gas").value;

    fetch(API + "/gas-data", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({gas_level:Number(v)})
    })
    .then(r => r.json())
    .then(d => {
        let el = document.getElementById("status");
        el.innerHTML = d.status;
        el.className = d.status == "ALERT" ? "alert" : "safe";
    });
}


// ⚡ CONTROL APPLIANCES
function control(device, action){
    fetch(API + "/control", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({device:device, action:action})
    })
    .then(r => r.json())
    .then(d => {
        document.getElementById("appliances").innerHTML =
            JSON.stringify(d.appliances);
    });
}


// 🔥 FIRE ALERT (SIMULATION)
function detectFire(){
    fetch(API + "/fire", {
        method:"POST"
    })
    .then(r => r.json())
    .then(d => {
        alert("🔥 FIRE DETECTED!");
    });
}


// 📷 CAMERA
navigator.mediaDevices.getUserMedia({video:true})
.then(stream => {
    document.getElementById("cam").srcObject = stream;
})
.catch(err => {
    console.log("Camera error:", err);
});

</script>

</body>
</html>
