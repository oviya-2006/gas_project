<!DOCTYPE html>
<html>
<head>
<title>Smart Gas System</title>

<style>
body{
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}
.card{
    background:#222;
    padding:15px;
    margin:10px;
    border-radius:10px;
}
button{
    padding:10px;
    margin:5px;
}
</style>
</head>

<body>

<h1>🏠 Smart Gas System</h1>

<div class="card">
<h2>Gas Monitoring</h2>
<input id="gas" type="number">
<button onclick="sendGas()">Check</button>
<h3 id="status"></h3>
</div>

<div class="card">
<h2>🎥 Video Detection</h2>
<input type="file" id="video">
<button onclick="uploadVideo()">Upload</button>
<h3 id="videoResult"></h3>
</div>

<div class="card">
<h2>⚡ Appliances</h2>
<button onclick="control('fan','ON')">Fan ON</button>
<button onclick="control('fan','OFF')">Fan OFF</button>

<button onclick="control('tv','ON')">TV ON</button>
<button onclick="control('tv','OFF')">TV OFF</button>

<button onclick="control('ac','ON')">AC ON</button>
<button onclick="control('ac','OFF')">AC OFF</button>

<button onclick="control('light','ON')">Light ON</button>
<button onclick="control('light','OFF')">Light OFF</button>

<button onclick="control('washing_machine','ON')">WM ON</button>
<button onclick="control('washing_machine','OFF')">WM OFF</button>

<button onclick="control('main_power','OFF')">CUT POWER</button>

<pre id="appliances"></pre>
</div>

<div class="card">
<h2>📷 Live Camera</h2>
<video id="cam" width="300" autoplay></video>
</div>

<div class="card">
<h2>📊 Database</h2>
<button onclick="viewData()">View Data</button>
<pre id="db"></pre>
</div>

<script>

let API = window.location.origin;

function sendGas(){
fetch(API+"/gas-data",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({gas_level:Number(gas.value)})
})
.then(r=>r.json())
.then(d=>{
status.innerHTML=d.status;
});
}

function uploadVideo(){
let file=document.getElementById("video").files[0];
let fd=new FormData();
fd.append("video",file);

fetch(API+"/upload-video",{method:"POST",body:fd})
.then(r=>r.json())
.then(d=>{
videoResult.innerHTML=d.result;
});
}

function control(d,a){
fetch(API+"/control",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({device:d,action:a})
})
.then(r=>r.json())
.then(d=>{
appliances.innerHTML=JSON.stringify(d,null,2);
});
}

function viewData(){
fetch(API+"/view-data")
.then(r=>r.json())
.then(d=>{
db.innerHTML=JSON.stringify(d,null,2);
});
}

// CAMERA
navigator.mediaDevices.getUserMedia({video:true})
.then(s=>cam.srcObject=s);

</script>

</body>
</html>

</body>
</html>
